global
    log stdout format raw local0
    maxconn 1000

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    # Timeouts importantes para MySQL/MariaDB
    timeout connect  5s
    timeout client   1m
    timeout server   1m
    # Detectar servidores caídos rápido
    timeout check    2s
    retries          3

resolvers docker_dns
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid      10s

# Frontend: punto de entrada para las conexiones MySQL
frontend galera_front
    bind *:3306
    default_backend galera_back

# Backend Galera: node1 primario, node2 y node3 como backup
backend galera_back
    # "first" envía todo al primer servidor disponible con capacidad
    balance first

    # Health check: verifica que MySQL responde
    option mysql-check user haproxy_check

    # db-node1 = PRIMARIO (peso alto, sin "backup")
    server db-node1 db-node1:3306 check inter 2s rise 2 fall 3 resolvers docker_dns resolve-prefer ipv4

    # db-node2 y db-node3 = BACKUP (solo reciben tráfico si node1 está caído)
    server db-node2 db-node2:3306 check inter 2s rise 2 fall 3 backup resolvers docker_dns resolve-prefer ipv4
    server db-node3 db-node3:3306 check inter 2s rise 2 fall 3 backup resolvers docker_dns resolve-prefer ipv4

# Panel de monitorización de HAProxy (opcional pero útil)
frontend haproxy_stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
