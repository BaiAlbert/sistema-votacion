services:
  db:
    image: mysql:8.0.45-debian
    container_name: votacion_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_appvotaciones
      MYSQL_USER: user_appvotaciones
      MYSQL_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Execute the setup scripts on the first startup
      - ./backend/database:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: votacion_backend
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: votacion_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: user_appvotaciones
      PMA_PASSWORD: 123456
    depends_on:
      - db

  frontend:
    image: node:iron-trixie-slim
    container_name: votacion_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent overwriting node_modules inside container if it exists
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  db_data:
