version: "3.8"

services:
  db:
    image: baialbert/votacion-db:latest
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_es_0900_ai_ci --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_appvotaciones
      MYSQL_USER: user_appvotaciones
      MYSQL_PASSWORD: 123456
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - votacion_net
    deploy:
      # Obligamos a que la BD siempre vaya al nodo que etiquetamos como "database" (.2)
      placement:
        constraints:
          - node.labels.role == database

  backend:
    image: baialbert/votacion-backend:latest
    ports:
      - "8000:80"
    environment:
      DB_HOST: db
      DB_NAME: db_appvotaciones
      DB_USER: user_appvotaciones
      DB_PASS: 123456
      JWT_SECRET: "xOIafnsCxfcqHjt0FlrmC0KCB4gg3DFV0enpsYVALal"
    networks:
      - votacion_net
    deploy:
      replicas: 2 # 2 instancias del backend
      placement:
        constraints:
          - node.labels.role == app

  frontend:
    image: baialbert/votacion-frontend:latest
    ports:
      - "3000:3000"
    networks:
      - votacion_net
    deploy:
      replicas: 2 # 2 instancias del frontend
      placement:
        constraints:
          - node.labels.role == app

  phpmyadmin:
    image: phpmyadmin:5.2
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: user_appvotaciones
      PMA_PASSWORD: 123456
    networks:
      - votacion_net
    deploy:
      # phpmyadmin puede ir a cualquier nodo de app
      placement:
        constraints:
          - node.labels.role == app

networks:
  votacion_net:
    driver: overlay # Red especial de Swarm para que los nodos se comuniquen

volumes:
  db_data: