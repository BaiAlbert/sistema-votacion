version: '3.8'

services:
    # 1. Base de datos (Un solo nodo, simple y rápida)
    db:
        image: mariadb:12.2.2 # Ya que nuestro Galera de producción usa MariaDB 12.2.2
        environment:
            MARIADB_ROOT_PASSWORD: root
            MARIADB_DATABASE: db_appvotaciones
            MARIADB_USER: user_appvotaciones
            MARIADB_PASSWORD: 1234
        ports:
            - '3306:3306'
        volumes:
            # Datos persistentes en local
            - db_data_local:/var/lib/mysql
            # Autocarga de esquemas y datos mockeados (igual que en producción)
            - ./database/1_esquema_db.sql:/docker-entrypoint-initdb.d/1_esquema_db.sql
            - ./database/datos_prueba.sql:/docker-entrypoint-initdb.d/datos_prueba.sql

    # 2. Backend (API PHP)
    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        ports:
            - '8000:80'
        environment:
            DB_HOST: db
            DB_NAME: db_appvotaciones
            DB_USER: user_appvotaciones
            # Secretos en texto plano para facilitar el desarrollo local
            DB_PASSWORD: 1234
            JWT_SECRET: c579f2c9818dd0fafec7022c1ce80bfc1dba7cfa09b1650c84eb379e2a8d4a89b28f7ce89e81a6b62f740a01975708ec2e8621057fb329bc9d58370c1e73abd3
            DNI_PEPPER: 6b8821901f9587a0d33aa0dec880d2a78ccf3f9adca2523b228135d0c71ac4c5
            BLOCKCHAIN_SECRET: 83299ee1bd7515afe3503044ceb2378952210d1d6ef4d2ac600a618ad61bb340
        volumes:
            # Montamos el código local dentro del contenedor.
            # Así si un archivo PHP es editado cambia al instante sin reiniciar.
            - ./backend:/var/www/html
            - /var/www/html/vendor

    # 3. Frontend (React + Vite)
    frontend:
        image: node:24-bookworm-slim
        working_dir: /app
        # Instala dependencias y lanza el servidor de desarrollo de Vite
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
        ports:
            - '3000:3000'
        environment:
            # Vite necesita saber dónde está la API
            - VITE_API_URL=http://localhost:8000/api
        volumes:
            # Montamos el código local para que el "Hot Module Replacement" funcione
            - ./frontend:/app
            # Evitamos sobreescribir los node_modules del contenedor
            - /app/node_modules

volumes:
    db_data_local:
